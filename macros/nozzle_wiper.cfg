# Hardware-agnostic NOZZLE WIPER v2
# Part of klipper-nerdygriffin-macros
# Source: https://github.com/chirpy2605/voron/tree/main/V0/NozzleWiper
#
# A servo-actuated nozzle purge bucket and brush system for automated nozzle cleaning
#
# Features:
# - Servo-controlled deployment (extends for cleaning, retracts when not in use)
# - Integrated purge bucket and brush
# - Hot-to-cold cleaning capability (wipes while cooling to minimize oozing)
# - Simple edge-to-edge sweep pattern (AFC Brush style)
# - Configurable wipe count, speeds, and temperatures
# - Optional STATUS_* LED integration
# - KAMP tip_distance synchronization
#
# See docs/CONFIGURATION.md for complete setup and customization instructions.

[gcode_macro _NW_BRUSH_VARS]
description: Brush macro configuration variables
gcode: # Leave empty

variable_brush_loc                : 10,38     # Position of the center of the brush
variable_brush_clean_speed        : 30000     # Speed of cleaning moves when brushing
# Accel of cleaning moves when brushing. This will overwrite the global accel for this macro. Set to 0 to use global accel
variable_brush_clean_accel        : 3000
variable_brush_width              : 35        # Total width in mm of the brush in the Y direction
variable_brush_depth              : 7         # Total depth in mm of the brush in the X direction
variable_x_brush                  : True      # True - Brush along X axis first then Y. False - Only brush along Y
variable_brush_count              : 4         # Number of passes to make on the brush.

[gcode_macro NW_TEST_CLEAN_NOZZLE]
description: Test macro to heat and clean nozzle (for calibration)
gcode:
    M104 S240
    G28
    M109 S240
    NW_CLEAN_NOZZLE

[gcode_macro NW_CLEAN_NOZZLE]
description: Main nozzle cleaning routine (deploy, purge, wipe, retract)
gcode:
    {% if printer['gcode_macro STATUS_CLEANING'] is defined %}
        STATUS_CLEANING
    {% endif %}

    {% if "xyz" in printer.toolhead.homed_axes %}
        SAVE_GCODE_STATE NAME=NW_CLEAN_NOZZLE
        G90
        NW_DEPLOY
        NW_PURGE
        NW_WIPE
        NW_RETRACT
        RESTORE_GCODE_STATE NAME=NW_CLEAN_NOZZLE
    {% else %}
        { action_raise_error("Home All Axis First") }
        M117 Home All Axis First
    {% endif %}

    {% if printer['gcode_macro STATUS_READY'] is defined %}
        STATUS_READY
    {% elif printer['gcode_macro RESET_STATUS'] is defined %}
        RESET_STATUS
    {% endif %}

[gcode_macro NW_BUCKET_POS]
description: Bucket/brush position variables (override in printer.cfg)
# See docs/CONFIGURATION.md for calibration instructions
variable_x: -1000  # Deliberately wrong - forces calibration
variable_y: -1000  # Deliberately wrong - forces calibration
variable_z: 50     # Safe default Z height
gcode:
    M118 bucket pos X:{printer["gcode_macro NW_BUCKET_POS"].x} Y:{printer["gcode_macro NW_BUCKET_POS"].y} Z:{printer["gcode_macro NW_BUCKET_POS"].z}

[gcode_macro NW_DEPLOY]
description: Deploy servo arm (extend for cleaning)
gcode:
    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z} F6000
    SET_SERVO SERVO=wipeServo ANGLE=0
    G4 P500

[gcode_macro NW_RETRACT]
description: Retract servo arm (stow after cleaning)
gcode:
    SET_SERVO SERVO=wipeServo ANGLE=90
    SET_SERVO SERVO=wipeServo WIDTH=0  # Turn off servo PWM
    G4 P500

[gcode_macro NW_WIPE]
description: Wipe nozzle on brush with hot-to-cold cleaning
# Hot-to-cold cleaning: wipes while cooling to minimize oozing
variable_enable_hotcold: True  # Set to False to disable cooling during wipe

gcode:
    {% if printer['gcode_macro STATUS_CLEANING'] is defined %}
        STATUS_CLEANING
    {% endif %}

    # Calculate wipe parameters
    {% set vars = printer['gcode_macro _NW_BRUSH_VARS'] %}
    {% set travel_speed = printer.toolhead.max_velocity * 60 | float %}
    {% set z_travel_speed = printer.configfile.settings.printer.max_z_velocity * 60 | float %}
    {% set brush_x_max = vars.brush_loc[0] + vars.brush_depth / 2 %}
    {% set brush_x_min = vars.brush_loc[0] - vars.brush_depth / 2 %}
    {% set brush_y_max = vars.brush_loc[1] + vars.brush_width / 2 %}
    {% set brush_y_min = vars.brush_loc[1] - vars.brush_width / 2 %}

    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z} F{z_travel_speed}
    G0 X{vars.brush_loc[0]} Y{vars.brush_loc[1]} F{travel_speed}

    # Set temp to min scrub temp to allow nozzle to cool during scrubbing
    {% if enable_hotcold == True %}
        {% set scrub_temp_min = [printer.configfile.settings['extruder'].min_extrude_temp|int - 20,
                                printer.configfile.settings['heater_fan hotend_fan'].heater_temp|int]|max %}
        M104 S{scrub_temp_min}
    {% endif %}

    M106 S255  # Part cooling fan on for air circulation
    M400
    SET_VELOCITY_LIMIT ACCEL={vars.brush_clean_accel}

    # Base wipe passes (min → max → center per axis)
    _NW_NOZZLE_MOVE

    # Hot-to-cold: continue wiping until nozzle cools
    {% if enable_hotcold == True %}
        SET_GCODE_VARIABLE MACRO=_NW_COOLDOWN_WIPE VARIABLE=move VALUE=True
        {% for wipe in range(16) %}
            _NW_COOLDOWN_WIPE
        {% endfor %}
    {% endif %}

    M400
    SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
    M106 S0  # Part cooling fan off

    # Clear from area
    M117 Cleaned!
    G0 Y{vars.brush_loc[1] + vars.brush_width / 2 + 20} F{travel_speed}
    G0 X60 F{travel_speed}
    G0 Y60 F{travel_speed}

    {% if printer['gcode_macro STATUS_READY'] is defined %}
        STATUS_READY
    {% elif printer['gcode_macro RESET_STATUS'] is defined %}
        RESET_STATUS
    {% endif %}

[gcode_macro NW_PURGE]
description: Purge filament into bucket before wiping
# Purge parameters
variable_purge_len: 5          # Amount of filament to purge (mm)
variable_purge_spd: 150        # Purge speed (mm/min)
variable_purge_temp_min: 240   # Minimum nozzle temperature for purge (°C)
variable_purge_ret: 2          # Retract after purge to prevent oozing (mm)
variable_ooze_dwell: 2         # Dwell time after retract (seconds)

gcode:
    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z} F6000
    G0 Y{printer["gcode_macro NW_BUCKET_POS"].y + 40} F6000
    G0 X{printer["gcode_macro NW_BUCKET_POS"].x}
    G0 Y{printer["gcode_macro NW_BUCKET_POS"].y} F6000

    # Unretract if previously retracted (conditional helper from filament_management.cfg)
    {% if printer['gcode_macro _CONDITIONAL_UNRETRACT'] is defined %}
        _CONDITIONAL_UNRETRACT
    {% endif %}

    {% if printer.extruder.temperature >= purge_temp_min %}
        M83  # Relative extrusion mode
        G1 E{purge_len} F{purge_spd}
        G1 E-{purge_ret} F{purge_spd * 5}
        G4 P{ooze_dwell * 1000}
        G92 E0  # Reset extruder position

        # Sync tip_distance with KAMP if available
        {% if printer['gcode_macro _KAMP_Settings'] is defined %}
            SET_GCODE_VARIABLE MACRO=_KAMP_Settings VARIABLE=tip_distance VALUE={purge_ret}
        {% endif %}
    {% endif %}

[gcode_macro _NW_NOZZLE_MOVE]
gcode:
    {% set vars = printer['gcode_macro _NW_BRUSH_VARS'] %}
        {% set Bx, By, Bz        = vars.brush_loc           | default([-1,-1,-1])| map('float') %}
    {% set brush_clean_accel = vars['brush_clean_accel']| default(0)         | float %}
    {% set x_brush           = vars['x_brush']          | default(false)     | lower == 'true' %}
    {% set brush_clean_speed = vars['brush_clean_speed']| default(150)*60    | float %}
    {% set brush_width       = vars['brush_width']      | default(30)        | float %}
    {% set brush_depth       = vars['brush_depth']      | default(10)        | float %}
    {% set brush_count       = vars['brush_count']      | default(4)         | int %}

    # Get min and max positions for brush moves
    {% set brush_x_max = Bx + brush_depth / 2 %}
    {% set brush_x_min = Bx - brush_depth / 2 %}
    {% set brush_y_max = By + brush_width / 2 %}
    {% set brush_y_min = By - brush_width / 2 %}

    # Wipe procedure
    {% if x_brush %}
        {% for wipe in range(brush_count) %}
            G1 X{brush_x_min} F{brush_clean_speed}
            G1 X{brush_x_max} F{brush_clean_speed}
            G1 X{Bx} F{brush_clean_speed}
        {% endfor %}
    {% endif %}

    # Brush procedure
    {% for wipe in range(brush_count) %}
        G1 Y{brush_y_min} F{brush_clean_speed}
        G1 Y{brush_y_max} F{brush_clean_speed}
        G1 Y{By} F{brush_clean_speed}
    {% endfor %}

[gcode_macro _NW_COOLDOWN_WIPE]
description: Single cooldown wipe pass — sweeps brush then checks temp
variable_move: True
gcode:
    {% if move == True %}
        _NW_NOZZLE_MOVE
        # Check if cooled to target
        {% set temp = printer[printer.toolhead.extruder].temperature %}
        {% set target = printer[printer.toolhead.extruder].target %}
        {% if temp <= target + 1 %}
            SET_GCODE_VARIABLE MACRO=_NW_COOLDOWN_WIPE VARIABLE=move VALUE=False
        {% endif %}
    {% endif %}

[gcode_macro CLEAN_NOZZLE]
description: Wrapper macro for compatibility with other systems
gcode: NW_CLEAN_NOZZLE

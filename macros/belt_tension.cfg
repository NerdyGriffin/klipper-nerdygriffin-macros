# Belt tension calibration macros
# Hardware-agnostic implementation
# Part of klipper-nerdygriffin-macros

[gcode_macro _BELT_TENSION_VARS]
description: Shared variables for belt tension macros. Override in printer.cfg.
variable_belt_span_length: 150      # Override: distance from X/Y idler centers to front idler centers (mm)
variable_y_calibrated: 120          # Override: Y coordinate where belt span = belt_span_length
variable_belt_mass_per_meter: 0.00817  # Belt mass in kg/m (derived from Voron 2lb @ 150mm = 110Hz spec; GT2 6mm nominal is 0.009 kg/m)
variable_min_tension: 8.90          # Minimum belt tension in Newtons (2 lbs per Voron docs)
variable_rec_tension: 11.12         # Recommended belt tension in Newtons (2.5 lbs for a radial load of 5lb)
variable_max_tension: 13.34         # Maximum belt tension in Newtons (3 lbs for a radial load of 6lb)
variable_min_freq: 0.0              # Computed by _BELT_TENSION_INIT
variable_rec_freq: 0.0              # Computed by _BELT_TENSION_INIT
variable_max_freq: 0.0              # Computed by _BELT_TENSION_INIT
gcode:
    # Intentionally empty - used only for variable storage

[gcode_macro _BELT_TENSION_INIT]
description: Validate belt tension config and pre-compute target frequencies. Call before using rec_freq/min_freq/max_freq.
gcode:
    {% set v = printer['gcode_macro _BELT_TENSION_VARS'] %}
    {% if v.y_calibrated < printer.toolhead.axis_minimum.y or v.y_calibrated > printer.toolhead.axis_maximum.y %}
        { raise_error('Belt tension: y_calibrated ({} mm) is out of bounds. Y axis range: {:.1f} to {:.1f} mm. Choose a smaller belt_span_length and re-calibrate y_calibrated to match.'.format(v.y_calibrated, printer.toolhead.axis_minimum.y, printer.toolhead.axis_maximum.y)) }
    {% endif %}
    # Calculate target frequency range using physics formula: f = (1 / (2L)) × √(T/m)
    # Where: f = frequency (Hz), L = span (m), T = tension (N), m = mass per meter (kg/m)
    {% set factor = 1.0 / (2.0 * (v.belt_span_length / 1000.0)) %}
    {% set min_freq = factor * (v.min_tension / v.belt_mass_per_meter) ** 0.5 %}
    {% set rec_freq = factor * (v.rec_tension / v.belt_mass_per_meter) ** 0.5 %}
    {% set max_freq = factor * (v.max_tension / v.belt_mass_per_meter) ** 0.5 %}
    SET_GCODE_VARIABLE MACRO=_BELT_TENSION_VARS VARIABLE=min_freq VALUE={min_freq}
    SET_GCODE_VARIABLE MACRO=_BELT_TENSION_VARS VARIABLE=rec_freq VALUE={rec_freq}
    SET_GCODE_VARIABLE MACRO=_BELT_TENSION_VARS VARIABLE=max_freq VALUE={max_freq}

[gcode_macro _BELT_TENSION_DISPLAY]
description: Display computed belt tension target frequency range. Call after _BELT_TENSION_INIT.
gcode:
    {% set v = printer['gcode_macro _BELT_TENSION_VARS'] %}
    M117 Belt span: {v.belt_span_length|int}mm | Target: {v.rec_freq|int}Hz | Range: {v.min_freq|int}-{v.max_freq|int}Hz

[gcode_macro SETTLE_BELT_TENSION]
# Source: https://github.com/AndrewEllis93/Print-Tuning-Guide/blob/main/macros/TEST_SPEED.cfg
# Home, throw around toolhead, park toolhead at calibrated position for external belt frequency measurement.
# See docs/belt_tension.md for calibration instructions
description: Move the toolhead around to allow the belts to settle after a tension adjustment
gcode:
    _BELT_TENSION_INIT

    TURN_OFF_HEATERS

    # Use printer max velocity/accel with safety margins
    {% set speed = printer.configfile.settings.printer.max_velocity|int %}
    {% set accel = (printer.configfile.settings.printer.max_accel / 2)|int %}
    {% set bound = 20 %}

    # Large pattern - max positions, inset by bound
    {% set x_min = printer.toolhead.axis_minimum.x + bound %}
    {% set x_max = printer.toolhead.axis_maximum.x - bound %}
    {% set y_min = printer.toolhead.axis_minimum.y + bound %}
    {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    {% set z_max = printer.toolhead.axis_maximum.z - (bound + 10) %}
    {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float) / 2 %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=SETTLE_BELT_TENSION

    # Home
    M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
    _CG28
    # QGL if not already QGLd (only if QGL section exists in config)
    {% if printer.configfile.settings.quad_gantry_level %}
        {% if printer.quad_gantry_level.applied == False %}
            QUAD_GANTRY_LEVEL
            G28 Z
        {% endif %}
    {% endif %}
    G90
    M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
    G4 P1000

    # Go to starting position
    G0 X{x_center} Y{y_min} Z{z_max} F{speed*60}

    # Set velocity limits for settling moves
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel}

    # Run 2 iterations of large pattern moves
    {% for i in range(2) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}

        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel to configured values
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}

    # Park for belt tension measurement at calibrated y position
    {% set y_calibrated = printer['gcode_macro _BELT_TENSION_VARS'].y_calibrated %}
    G0 X{x_center} F{speed*60}
    G0 X{x_center} Y{y_calibrated} Z{z_max} F{speed*60}
    G4 P1000

    # Display belt span and calculated target frequency range
    _BELT_TENSION_DISPLAY

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=SETTLE_BELT_TENSION

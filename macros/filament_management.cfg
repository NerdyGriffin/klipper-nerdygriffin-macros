# Filament loading, unloading, and purging operations
# Hardware-agnostic implementation with AFC support
# Part of klipper-nerdygriffin-macros

[gcode_macro _FILAMENT_VARS]
description: Shared persistent variables for filament management operations
variable_extruder_temp: 0
gcode:
    # Intentionally empty - used only for variable storage

[gcode_macro _TOOLHEAD_PARK_VARS]
description: Configurable parking positions for filament operations
# Override these in your printer.cfg to customize parking positions
variable_custom_load_x: None          # X position for load/unload (None = auto-calculate center)
variable_custom_load_y: None          # Y position for load/unload (None = auto-calculate front + 10mm)
variable_custom_purge_x: None         # X position for purge (None = 10mm)
variable_custom_purge_y: None         # Y position for purge (None = auto-calculate front + 10mm)
gcode:

#####################################################################
#   Public Filament Macros (Expected by Mainsail & KlipperScreen)
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Loads new filament into toolhead (uses printer.extruder.target)
variable_load_distance: 50
variable_purge_distance: 25
gcode:
    {% set speed = [300, params.SPEED|default(300)|int]|max|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity|int * 60 %}

    _FILAMENT_OPERATION_INIT
    _HEAT_AND_PARK PARK_MACRO=_TOOLHEAD_PARK_LOAD_UNLOAD

    M117 Loading Filament...
    M83                            ; set extruder to relative
    G92 E0
    _TOOLHEAD_PARK_LOAD_UNLOAD
    G1 E{load_distance} F{max_velocity} # fast-load
    {% if printer['gcode_macro AFC_BRUSH'] is defined %}
        AFC_BRUSH
    {% endif %}
    _TOOLHEAD_PARK_PURGE
    G1 E{purge_distance} F{speed} # purge
    {% if printer['gcode_macro AFC_BRUSH'] is defined %}
        AFC_BRUSH
    {% endif %}
    G92 E0

    M117 Load Complete!
    SET_GCODE_VARIABLE MACRO=_CONDITIONAL_UNRETRACT VARIABLE=needs_unretract VALUE=False
    _FILAMENT_OPERATION_CLEANUP

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead (uses printer.extruder.target)
variable_unload_distance: 50
variable_purge_distance: 25
gcode:
    {% set speed = [300, params.SPEED|default(300)|int]|max|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity|int * 60 %}

    _FILAMENT_OPERATION_INIT
    _HEAT_AND_PARK PARK_MACRO=_TOOLHEAD_PARK_LOAD_UNLOAD

    {% if printer['gcode_macro AFC_CUT'] is defined %}
        AFC_CUT
        M400                           ; wait for buffer to clear
        _HEAT_AND_PARK PARK_MACRO=_TOOLHEAD_PARK_LOAD_UNLOAD
    {% endif %}

    M117 Unloading Filament...
    M83                            ; set extruder to relative
    G92 E0
    M104 S{printer.configfile.settings['extruder'].min_extrude_temp|int + 5}  ; cool to safe minimum after unload
    {% if printer['gcode_macro AFC_CUT'] is not defined %}
        _TOOLHEAD_PARK_PURGE
        G1 E{purge_distance} F{speed} # purge
    {% endif %}
    {% if printer['gcode_macro AFC_BRUSH'] is defined %}
        AFC_BRUSH
    {% endif %}
    M106 S255
    G1 E-{unload_distance} F{max_velocity} # quickly retract to eliminate stringing
    {% if printer['gcode_macro AFC_BRUSH'] is defined %}
        AFC_BRUSH
    {% endif %}
    G92 E0

    M117 Unload Complete!
    SET_GCODE_VARIABLE MACRO=_CONDITIONAL_UNRETRACT VARIABLE=needs_unretract VALUE=True
    _FILAMENT_OPERATION_CLEANUP

[gcode_macro PURGE_FILAMENT]
description: Purge filament in a safe location (uses printer.extruder.target)
variable_purge_distance: 25
gcode:
    {% set speed = params.SPEED|default(300)|int %}

    _FILAMENT_OPERATION_INIT
    _HEAT_AND_PARK PARK_MACRO=_TOOLHEAD_PARK_PURGE

    M117 Purging Filament...
    M83                            ; set extruder to relative
    G92 E0
    _TOOLHEAD_PARK_PURGE
    G1 E{purge_distance} F{speed} # purge
    {% if printer['gcode_macro AFC_BRUSH'] is defined %}
        AFC_BRUSH
    {% endif %}
    G92 E0

    M117 Purge Complete!
    SET_GCODE_VARIABLE MACRO=_CONDITIONAL_UNRETRACT VARIABLE=needs_unretract VALUE=False
    _FILAMENT_OPERATION_CLEANUP

# M600 Filament Change Macro (Reserved for Future Multi-Filament Systems)
# Commented out pending installation of BoxTurtle or similar multi-material system.
# When uncommented, this provides Marlin-style M600 filament change during prints.
# [gcode_macro M600]
# description: Filament change
# gcode:
#     {% set x_center = printer.toolhead.axis_maximum.x|float / 2.0 %}
#     {% set y_front = printer.toolhead.axis_minimum.y|float + 10 %}
#     PAUSE X={x_center} Y={y_front} Z_MIN=50
#     # Z_MIN will park the toolhead at a minimum of 50 mm above to bed to make it easier for you to swap filament.

#####################################################################
#   Filament Sensor Management
#####################################################################

[delayed_gcode ENABLE_ENCODER_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1

[delayed_gcode DISABLE_ENCODER_SENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0

#####################################################################
#   Helper Macros (Internal Use)
#####################################################################

[gcode_macro _FILAMENT_OPERATION_INIT]
description: Common initialization for filament operations
gcode:
    {% set motion_sensor_enabled = printer["filament_motion_sensor encoder_sensor"].enabled %}
    M300 P200
    SAVE_GCODE_STATE NAME=filament_operation_state
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0
    # Store sensor state for cleanup
    SET_GCODE_VARIABLE MACRO=_FILAMENT_OPERATION_CLEANUP VARIABLE=restore_sensor VALUE={motion_sensor_enabled}

    ##### Determine extruder temperature with idle timeout restoration #####
    {% set min_temp = printer.configfile.settings['extruder'].min_extrude_temp|int + 5 %}
    {% set last_extruder_temp = printer['gcode_macro RESUME'].last_extruder_temp %}

    # Start with the extruder target temperature
    {% set extruder_temp = printer.extruder.target|int %}

    # If paused with saved temp AND extruder cooled below minimum, restore saved temperature
    {% if printer.pause_resume.is_paused and last_extruder_temp.restore and extruder_temp < min_temp %}
        # we need to use the unicode (\u00B0) for the ° as py2 env's would throw an error otherwise
        RESPOND TYPE=echo MSG='{"Restoring \"%s\" temperature to %3.1f\u00B0C, this may take some time" % (printer.toolhead.extruder, last_extruder_temp.temp) }'
        {% set extruder_temp = last_extruder_temp.temp %}
    {% endif %}

    # Always enforce minimum temperature safety
    {% set extruder_temp = [min_temp, extruder_temp]|max %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=extruder_temp VALUE={extruder_temp}
    _CG28
    M104 S{extruder_temp}

[gcode_macro _FILAMENT_OPERATION_CLEANUP]
description: Common cleanup for filament operations
variable_restore_sensor: False
gcode:
    {% set is_paused = printer.pause_resume.is_paused or printer.virtual_sdcard.is_active %}
    M400                           ; wait for moves to finish
    M104 S150
    {% if printer['gcode_macro AFC_PARK'] is defined %}
        AFC_PARK
    {% else %}
        _TOOLHEAD_PARK_LOAD_UNLOAD
    {% endif %}
    M400                           ; wait for moves to finish
    RESET_STATUS
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=10
    {% if restore_sensor %}
        SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
    {% endif %}
    M300 P400 # long beep
    RESTORE_GCODE_STATE NAME=filament_operation_state
    {% if is_paused %} SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=True {% endif %}

[gcode_macro _HEAT_AND_PARK]
description: Heat extruder and park for filament operation
gcode:
    {% set extruder_temp = printer['gcode_macro _FILAMENT_VARS'].extruder_temp %}
    {% set park_macro = params.PARK_MACRO|default("_TOOLHEAD_PARK_LOAD_UNLOAD")|string %}
    {park_macro}
    M109 S{extruder_temp}          ; set extruder temperature and wait until it reaches target
    M400                           ; wait for buffer to clear
    STATUS_BUSY

[gcode_macro _TOOLHEAD_PARK_LOAD_UNLOAD]
description: Helper: park toolhead used in LOAD_FILAMENT and UNLOAD_FILAMENT
gcode:
    ##### get user parameters or use default #####
    {% set mode     = params.MODE|default("load")|lower %}
    {% set vars     = printer['gcode_macro _TOOLHEAD_PARK_VARS'] %}
    {% set use_custom_load  = mode == "load"  and vars.custom_load_x  is not none and vars.custom_load_y  is not none %}
    {% set custom_load_x   = vars.custom_load_x|default(0.0) %}
    {% set custom_load_y   = vars.custom_load_y|default(0.0) %}
    {% set use_custom_purge = mode == "purge" and vars.custom_purge_x is not none and vars.custom_purge_y is not none %}
    {% set custom_purge_x  = vars.custom_purge_x|default(0.0) %}
    {% set custom_purge_y  = vars.custom_purge_y|default(0.0) %}
    {% set client   = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
    {% set velocity = [printer.configfile.settings.pause_resume.recover_velocity, printer.toolhead.max_velocity * 60 | float]|max %} ; TODO: Choose an appropriate default velocity for parking moves, either recovery velocity or toolhead max velocity, not both
    {% set use_custom_pos     = client.use_custom_pos|default(false)|lower == 'true' %}
    {% set custom_park_x  = client.custom_park_x|default(0.0) %}
    {% set custom_park_y  = client.custom_park_y|default(0.0) %}
    {% set sp_hop   = client.speed_hop|default(150) * 60 %}
    {% set sp_move  = client.speed_move|default(velocity) * 60 %}
    ##### get config and toolhead values #####
    {% set max = printer.toolhead.axis_maximum %}
    {% set min = printer.toolhead.axis_minimum %}
    {% set has_afc = printer['gcode_macro _AFC_BRUSH_VARS'] is defined %}
    {% if has_afc %}
        {% set bvars = printer['gcode_macro _AFC_BRUSH_VARS'] %}
        {% set Bx, By, Bz = bvars.brush_loc|default([-1,-1,-1])|map('float') %}
        {% set afc_brush_x = Bx + bvars['brush_width']|default(30)|float %}
        {% set afc_brush_y = By %}
    {% else %}
        {% set afc_brush_x = 0 %}
        {% set afc_brush_y = 0 %}
    {% endif %}
    ##### define park position #####
    # Priority: _TOOLHEAD_PARK_VARS > _CLIENT_VARIABLE > AFC brush > auto
    {% set z_park = ((max.z * 0.75) / 10)|int * 10 %}
    {% set x_park = custom_purge_x  if use_custom_purge
               else custom_load_x   if use_custom_load
               else custom_park_x   if use_custom_pos
               else afc_brush_x     if has_afc
               else (10.0 if mode == "purge" else max.x / 2.0) %}
    {% set y_park = custom_purge_y  if use_custom_purge
               else custom_load_y   if use_custom_load
               else custom_park_y   if use_custom_pos
               else afc_brush_y     if has_afc
               else (min.y + 10) %}
    ##### end of definitions #####
    {% if "xyz" in printer.toolhead.homed_axes %}
        G90
        {% if not (printer.pause_resume.is_paused or printer.virtual_sdcard.is_active) %}
            G0 Z{z_park} F{sp_hop}
        {% endif %}
        G0 X{x_park} Y{y_park} F{sp_move}
        {% if not printer.gcode_move.absolute_coordinates %} G91 {% endif %}
    {% else %}
        RESPOND TYPE=echo MSG='Printer not homed'
    {% endif %}

[gcode_macro _TOOLHEAD_PARK_PURGE]
description: Helper: park toolhead used in PURGE_FILAMENT
gcode:
    _TOOLHEAD_PARK_LOAD_UNLOAD MODE=purge

#####################################################################
#   Retraction Helpers
#####################################################################

[gcode_macro _CONDITIONAL_UNRETRACT]
variable_needs_unretract: True
gcode:
    ##### get user parameters or use default #####
    {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
    {% set length = params.LENGTH|default(client.unretract)|default(1.0)|float %}
    ##### end of definitions #####
    {% if needs_unretract and printer[printer.toolhead.extruder].can_extrude %}
        _CLIENT_EXTRUDE LENGTH={length}
        SET_GCODE_VARIABLE MACRO=_KAMP_Settings VARIABLE=tip_distance VALUE=0
        SET_GCODE_VARIABLE MACRO=_CONDITIONAL_UNRETRACT VARIABLE=needs_unretract VALUE=False
    {% endif %}

[gcode_macro _CONDITIONAL_RETRACT]
gcode:
    ##### get user parameters or use default #####
    {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
    {% set length = params.LENGTH|default(client.retract)|default(1.0)|float %}
    ##### end of definitions #####
    {% if printer[printer.toolhead.extruder].can_extrude %}
        _CLIENT_RETRACT LENGTH={length}
        SET_GCODE_VARIABLE MACRO=_KAMP_Settings VARIABLE=tip_distance VALUE={length}
        SET_GCODE_VARIABLE MACRO=_CONDITIONAL_UNRETRACT VARIABLE=needs_unretract VALUE=True
    {% endif %}

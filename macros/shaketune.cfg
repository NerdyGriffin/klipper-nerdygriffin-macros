# Shake&Tune wrapper macros with hardware-agnostic positioning
# Part of klipper-nerdygriffin-macros
#
# NOTE: Requires Shake&Tune to be installed separately
# See: https://github.com/Frix-x/klippain-shaketune

[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store
#    results in a different location.
# number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
# keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
# show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
# timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
# measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
# max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
# dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

[gcode_macro SHAKETUNE_BELTS]
description: Run just the COMPARE_BELTS_RESPONSES with cold printer
gcode:
    G28
    TURN_OFF_HEATERS
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={printer.configfile.settings['heater_fan hotend_fan'].heater_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={printer.configfile.settings['heater_fan bed_fan'].heater_temp}
    M107
    G28
    {% if printer.configfile.settings.z_tilt %}
        Z_TILT_ADJUST
    {% endif %}
    COMPARE_BELTS_RESPONSES
    G28
    M300 P1000

[gcode_macro SHAKETUNE_COLD]
description: Run full Shake&Tune calibration suite with cold printer
gcode:
    G28
    TURN_OFF_HEATERS
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={printer.configfile.settings['heater_fan hotend_fan'].heater_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={printer.configfile.settings['heater_fan bed_fan'].heater_temp}
    M107
    G28
    {% if printer.configfile.settings.z_tilt %}
        Z_TILT_ADJUST
    {% endif %}
    COMPARE_BELTS_RESPONSES
    G28
    AXES_SHAPER_CALIBRATION
    G28
    CREATE_VIBRATIONS_PROFILE
    G28
    M300 P1000

[gcode_macro SHAKETUNE_HOT]
description: Run full Shake&Tune calibration suite with hot printer
gcode:
    G28
    M104 S150
    M140 S100
    HEAT_SOAK CHAMBER=50
    M107
    G28
    {% if printer.configfile.settings.z_tilt %}
        Z_TILT_ADJUST
    {% endif %}
    COMPARE_BELTS_RESPONSES
    G28
    AXES_SHAPER_CALIBRATION
    G28
    CREATE_VIBRATIONS_PROFILE
    G28
    M300 P1000

[gcode_macro SHAKETUNE_EXCITATE_BELTS]
variable_belt_span_length: 150  # Override in printer.cfg with the calibrated belt span (distance from X/Y idler centers to front idler centers)
variable_y_calibrated: 120  # Override in printer.cfg with your calibrated Y position (y coordinate that corresponds to the calibrated belt span)
variable_belt_mass_per_meter: 0.00817  # Belt mass in kg/m (derived from Voron 2lb @ 150mm = 110Hz spec; GT2 6mm nominal is 0.009 kg/m)
variable_min_tension: 8.90  # Minimum belt tension in Newtons (2 lbs per Voron docs)
variable_rec_tension: 11.12  # Recommended belt tension in Newtons (2.5 lbs for a radial load of 5lb)
variable_max_tension: 13.34  # Maximum belt tension in Newtons (3 lbs for a radial load of 6lb)
gcode:
    # Validate y_calibrated is within axis limits to ensure accurate belt span frequency measurement
    {% if y_calibrated < printer.toolhead.axis_minimum.y or y_calibrated > printer.toolhead.axis_maximum.y %}
        { raise_error('SHAKETUNE_EXCITATE_BELTS: y_calibrated ({} mm) is out of bounds. Y axis range: {:.1f} to {:.1f} mm. Choose a smaller belt_span_length and re-calibrate y_calibrated to match.'.format(y_calibrated, printer.toolhead.axis_minimum.y, printer.toolhead.axis_maximum.y)) }
    {% endif %}

    # Calculate target frequency range using physics formula: f = (1 / (2L)) × √(T/m)
    # Where: f = frequency (Hz), L = span (m), T = tension (N), m = mass per meter (kg/m)
    {% set span_m = belt_span_length / 1000.0 %}  # Convert mm to meters
    {% set rec_tension_over_mass = rec_tension / belt_mass_per_meter %}
    {% set rec_sqrt = rec_tension_over_mass ** 0.5 %}
    {% set rec_freq = (1 / (2 * span_m)) * rec_sqrt %}

    G28
    TURN_OFF_HEATERS
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={printer.configfile.settings['heater_fan hotend_fan'].heater_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={printer.configfile.settings['heater_fan bed_fan'].heater_temp}
    M107
    G28
    {% if printer.configfile.settings.z_tilt %}
        Z_TILT_ADJUST
    {% endif %}
    EXCITATE_AXIS_AT_FREQ FREQUENCY={rec_freq|int} DURATION=300 Y_POS={y_calibrated}
    G28
    M300 P1000
